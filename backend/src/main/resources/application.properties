spring.application.name=TextbookExchange

# PostgreSQL DB config
spring.datasource.url=jdbc:postgresql://localhost:5432/textbook_exchange
spring.datasource.username=postgres
spring.datasource.password=12226578

# Hibernate & JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


# Flyway auto-config (optional; enabled by default)
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration
spring.flyway.ignore-missing-migrations=true
spring.flyway.unknown-database-version-handling=ignore

# Optional
spring.sql.init.mode=always

# SAML2 Configuration
spring.security.saml2.relyingparty.registration.ncstate.entity-id=http://localhost:8080
spring.security.saml2.relyingparty.registration.ncstate.identity-provider.entity-id=https://shib.ncsu.edu/idp/shibboleth
spring.security.saml2.relyingparty.registration.ncstate.identity-provider.single-sign-on-service.location=https://shib.ncsu.edu/idp/profile/SAML2/POST/SSO
spring.security.saml2.relyingparty.registration.ncstate.identity-provider.single-sign-on-service.binding=POST
spring.security.saml2.relyingparty.registration.ncstate.assertion-consumer-service.location=http://localhost:8080/login/saml2/sso/ncstate
spring.security.saml2.relyingparty.registration.ncstate.assertion-consumer-service.binding=POST

# Logging for debugging
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.saml2=DEBUG